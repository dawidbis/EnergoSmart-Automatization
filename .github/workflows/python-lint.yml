name: Python Linting

on:
  push:
    branches: [ main, develop ]
    paths:
      - '1_Skrypty_Python/**/*.py'
      - '.github/workflows/python-lint.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint Python scripts
      run: |
        flake8 1_Skrypty_Python/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 1_Skrypty_Python/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check .env.example exists
      run: |
        [ -f "1_Skrypty_Python/.env.example" ] && echo "✓ .env.example present" || exit 1
